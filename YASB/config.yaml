watch_stylesheet: true
watch_config: true
# This komorebi setting will be used for tray context menu.
# If you don't use komorebi, you can remove this section.
komorebi:
  start_command: "komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic reload-configuration"
# This is the main configuration file for Yet Another Status Bar (YASB)
bars:
  status-bar:
    enabled: true
    #screens: ['DELL P2419H (1)'] 
    #screens: ['DELL P2419H (2)'] 
    screens: ['*'] 
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: true
      acrylic: false 
      dark_mode: false
      round_corners: false
      border_color: None
    window_flags:
      hide_on_fullscreen: true
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 32
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
        [   "apps", 
          "separator",
          "taskbar"
        ]
      center:
        [ 
          "clock",
          "cava"
        ]
      right:
        [ 
          "media",
          "wifi",
          "bluetooth",
          "systray",
          "volume",
          "battery",
          "weather",
          "notes",
          "power_menu" 
        ]
widgets:
  notes:
      type: "yasb.notes.NotesWidget"
      options:
        label: "<span>\udb82\udd0c</span>"
        label_alt: "{count} notes"
        menu:
          blur: true
          round_corners: false
          round_corners_type: "normal"
          border_color: "None"
          alignment: "right"
          direction: "down"
          offset_top: 6
          offset_left: 0
          max_title_size: 150
          show_date_time: true
        icons:
          note: "\udb82\udd0c"
          delete: "\ueab8"
          copy: "\uebcc"
        callbacks:
          on_left: "toggle_menu"
          on_right: "toggle_label"

  launchpad:
      type: "yasb.launchpad.LaunchpadWidget"
      options:
        label: "\uf141"
        search_placeholder: "Search"
        app_icon_size: 32
        window:
          fullscreen: false
          width: 600
          height: 500
          overlay_block: true
        window_style:
          enable_blur: true
          round_corners: false
          round_corners_type: "normal"
          border_color: "None"
        window_animation:
          fade_in_duration: 120
          fade_out_duration: 100
        group_apps: false
        callbacks:
          on_left: "toggle_launchpad"

  separator:
      type: "yasb.custom.CustomWidget"
      options:
        label: "|"
        label_alt: "|"
        class_name: "separator-widget"
        container_padding:
          top: 0
          left: 0
          bottom: 0
          right: 0
  cava:
      type: "yasb.cava.CavaWidget"
      options:
        bar_height: 14
        min_bar_height: 0
        gradient: 1
        gradient_color_1: '#0A0E14'
        gradient_color_2: '#1B3A5C'
        gradient_color_3: '#A8D4F5'
        bars_number: 20
        bar_spacing: 2
        bar_width: 4
        bar_type: "waves"
        framerate: 60
        hide_empty: true
        monstercat: 1
 
  bluetooth:
      type: "yasb.bluetooth.BluetoothWidget"
      options:
        label: "<span>{icon}</span>"
        label_alt: "{device_name}"
        label_no_device: "No devices"
        label_device_separator: ", "
        max_length: 20
        max_length_ellipsis: "..."
        icons:
          bluetooth_on: "\udb80\udcaf"
          bluetooth_off: "\udb80\udcb2"
          bluetooth_connected: "\udb80\udcb1"
        callbacks:
          on_left: "toggle_label"
          on_right: "exec cmd.exe /c start ms-settings:bluetooth"
  taskbar:
      type: "yasb.taskbar.TaskbarWidget"
      options:
        icon_size: 16
        tooltip: false
        show_only_visible: true
        strict_filtering: true
        monitor_exclusive: true
        animation:
          enabled: false
        preview:
          enabled: false
          width: 200
          delay: 300
          padding: 6
          margin: 6
        title_label:
          enabled: false
          show: "always"
          min_length: 5
          max_length: 10
        ignore_apps:
          processes: []
          titles: []
          classes: []
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      show_unpinned: false
      icon_size: 16
      btn_shadow:
        enabled: true
        color: "black"
  apps:
    type: "yasb.applications.ApplicationsWidget"
    options:
      label: "{data}"
      app_list:
        - {icon: "\uf013", launch: "cmd /c start ms-settings:"}
        - {icon: "File", launch: "explorer"}
        - {icon: "Code", launch: "code"}
        - {icon: "Terminal", launch: "wt"}
        - {icon: "Browser", launch: "C:\\Program Files\\Mozilla Firefox\\firefox.exe"}
        - {icon: "Music", launch: "AppleMusic"}
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title} - {artist}"
      label_alt: "{title}"
      max_field_size:
        label: 20
        label_alt: 30
      show_thumbnail: true
      controls_only: false
      controls_left: true
      hide_empty: false
      thumbnail_alpha: 155
      thumbnail_padding: 8
      thumbnail_corner_radius: 0 # Set to 0 for square corners
      icons:
        prev_track: "\ue892"
        next_track: "\ue893"
        play: "\ue768"
        pause: "\ue769"

  active_window:
      type: "yasb.active_window.ActiveWindowWidget"
      options:
        label: "{win[process][name]}"
        label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
        label_no_window: ""
        label_icon: true
        label_icon_size: 16
        max_length: 36
        max_length_ellipsis: "..."
        monitor_exclusive: true

  battery:
      type: "yasb.battery.BatteryWidget"
      options:
        label: "Bat {percent}%"
        label_alt: "{icon} {percent}% | time: {time_remaining}"
        charging_options:
          icon_format: "{charging_icon}"

  clock:
      type: "yasb.clock.ClockWidget"
      options:
        label: "{%a %d, %b %H:%M}"
        label_alt: "{%A %d %B %Y, %H:%M}"
        #locale: 'en_EN' # Langugae for date, you can set your own, example fr_FR
        timezones: [] #Looking up time zone info from registry
        #timezones: ["America/Montreal"]
        calendar: 
          blur: True
          round_corners: True
          round_corners_type: 'normal'
          border_color: 'System'
          alignment: 'center'
          direction: 'down'
          distance: 12

  cpu:
      type: "yasb.cpu.CpuWidget"
      options:
        label: "<span>\uf4bc</span> {info[percent][total]}%"
        label_alt: "<span>\uf437</span> {info[histograms][cpu_percent]}"
        update_interval: 2000
        histogram_icons:
          - '\u2581' # 0%
          - '\u2581' # 10%
          - '\u2582' # 20%
          - '\u2583' # 30%
          - '\u2584' # 40%
          - '\u2585' # 50%
          - '\u2586' # 60%
          - '\u2587' # 70%
          - '\u2588' # 80%+
        histogram_num_columns: 8
        callbacks:
          on_right: "exec cmd /c Taskmgr"

  memory:
      type: "yasb.memory.MemoryWidget"
      options:
        label: "<span>\uefc5</span> {virtual_mem_free}"
        label_alt: "<span>\uefc5</span> {virtual_mem_percent}%"
        update_interval: 10000
        callbacks:
          on_right: "exec cmd /c Taskmgr"

  komorebi_workspaces:
      type: "komorebi.workspaces.WorkspaceWidget"
      options:
          label_offline: "\u26a1 Offline"
          label_workspace_btn: "\udb81\udc3d"
          label_workspace_active_btn: ""
          label_workspace_populated_btn: "\udb81\udc3e"
          label_default_name: "{index}"
          label_zero_index: false
          hide_empty_workspaces: false
          hide_if_offline: True
          animation: true
          container_padding:
            top: 0
            left: 0
            bottom: 0
            right: 0

  komorebi_active_layout:
      type: "komorebi.active_layout.ActiveLayoutWidget"
      options:
        hide_if_offline: true
        label: "{icon}"
        layouts: ['bsp', 'columns', 'rows', 'grid', 'vertical_stack', 'horizontal_stack', 'ultrawide_vertical_stack','right_main_vertical_stack']
        layout_icons:
          bsp: "BSP"
          columns: "COLS"
          rows: "ROWS"
          grid: "GRID"
          vertical_stack: "V-STACK"
          horizontal_stack: "H-STACK"
          ultrawide_vertical_stack: "W-STACK"
          right_main_vertical_stack: "RMV-STACK"
          monocle: "MONOCLE"
          maximised: "MAX"
          floating: "FLOATING"
          paused: "PAUSED"
        callbacks:
          on_left: 'next_layout'
          on_middle: 'toggle_monocle'
          on_right: 'prev_layout'

  wifi:
      type: "yasb.wifi.WifiWidget"
      options:
        label: "<span>{wifi_icon}</span>"
        label_alt: "{wifi_name} {wifi_strength}%"
        update_interval: 5000
        callbacks:
          on_left: "toggle_menu"
          on_middle: "do_nothing"
          on_right: "toggle_label"

  traffic:
      type: "yasb.traffic.TrafficWidget"
      options:
        label: "<span>\udb86\uddb3</span>{download_speed} | <span>\udb86\uddb2</span>{upload_speed}"
        label_alt: "Download {download_speed} \ue621 Upload {upload_speed}"
        update_interval: 1000 # Update interval should be a multiple of 1000
        callbacks:
          on_left: "toggle_label"
          on_right: "exec cmd /c Taskmgr"

  ip_info:
      type: "yasb.custom.CustomWidget"
      options:
        label: "<span>\udb81\udd9f</span> {data[ip]}"
        label_alt: "<span>\uf450</span> {data[city]} {data[region]}, {data[country]}"
        class_name: "ip-info-widget"
        exec_options:
          run_cmd: "curl.exe https://ipinfo.io"
          run_interval: 120000  # every 5 minutes
          return_format: "json"
        callbacks:
          on_left: "toggle_label"
          on_middle: "exec cmd /c ncpa.cpl" # open network settings
          on_right: "exec cmd /c start https://ipinfo.io/{data[ip]} " # open ipinfo in browser

  weather:
      type: "yasb.weather.WeatherWidget"
      options:
        label: "{temp}"
        label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}"
        api_key: '3bf4cf9a7c3f40d6b31174128242807' # Get your free API key from https://www.weatherapi.com/
        update_interval: 600 # Update interval in seconds, Min 600 seconds
        hide_decimal: true
        location: 'Vitoria, Brazil' # You can use "USA Los Angeles 90006" {COUNTRY CITY ZIP_CODE}, or just city.
        callbacks:
          on_left: "toggle_label"
        icons: 
          sunnyDay: "\ue30d"
          clearNight: "\ue32b"
          cloudyDay: "\udb81\udd99"
          cloudyNight: "\ue311"
          rainyDay: "\udb81\ude7e"
          rainyNight: "\udb81\ude7e"
          snowyDay: "\udb81\udd98"
          snowyNight: "\udb81\udd98"
          blizzardDay: "\uebaa"
          default: "\uebaa"
          # https://www.weatherapi.com/docs/
          # Usage {temp}, {min_temp}, {max_temp}, {temp_f}, {min_temp_f}, {max_temp_f}, {location}, {humidity}, {icon}, {conditions}

  volume:
      type: "yasb.volume.VolumeWidget"
      options:
        label: "Vol {level}"
        label_alt: "{volume}"
        volume_icons:
          - "\ueee8"
          - "\uf026"
          - "\uf027"
          - "\uf027"
          - "\uf028"
        callbacks:
          on_left: "toggle_volume_menu"
          on_right: "toggle_mute"
        audio_menu:
          blur: true
          round_corners: false
          round_corners_type: "normal"
          border_color: "system"
          alignment: "right"
          direction: "down"
          offset_top: 6
          offset_left: 0
          show_apps: true
          show_app_labels: true
          show_app_icons: true
          show_apps_expanded: true
          app_icons:
            toggle_down: "\uf078"
            toggle_up: "\uf077"

  power_menu:
      type: "yasb.power_menu.PowerMenuWidget"
      options:
        label: "\uf011"
        uptime: True
        blur: False
        blur_background: True
        animation_duration: 300 # Milisecond 
        button_row: 6 # Number of buttons in row, min 1 max 5
        buttons:
          lock: ["\uea75","Lock"]
          #sleep: ["\u23fe","Sleep"]
          shutdown: ["\uf011","Shut Down"]
          restart: ["\uead2","Restart"]
          hibernate: ["\uf28e","Hibernate"]
          cancel: ["\udb81\udf3a","Cancel"]
          #force_shutdown: ["\uf011","Force Shut Down"]
          #force_restart: ["\uead2","Force Restart"]

  github:
      type: "yasb.github.GithubWidget"
      options:
        label: "<span>\ueba1</span>"
        label_alt: "Notifications {data}" # {data} return number of unread notification
        token: ghp_xxxxxxxxxxx # GitHub Personal access tokens (classic) https://github.com/settings/tokens
        max_notification: 20 # Max number of notification displaying in menu max: 50
        only_unread: false # Show only unread or all notifications; 
        max_field_size: 54 # Max characters in title before truncation.
        menu_width: 400 
        menu_height: 400 
        menu_offset: 240 
        update_interval: 300 # Check for new notification in seconds

  wallapers:
      type: "yasb.wallpapers.WallpapersWidget"
      options:
        label: "<span>\udb83\ude09</span>"
        image_path: "C:\\Users\\xxx\\Images" # Path to folder with images
        change_automatically: false # Automatically change wallpaper
        update_interval: 60 # If change_automatically is true, update interval in seconds

  nvidia_temp:
      type: "yasb.custom.CustomWidget"
      options:
        label: "{data}<span>\udb81\udd04</span>"
        label_alt: "{data}"
        class_name: "system-widget"
        exec_options:
          run_cmd: "powershell nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader"
          run_interval: 10000 # run every 10 sec
          return_format: "string"

  win_button:
      type: "yasb.custom.CustomWidget"
      options:
        label: "^_^"
        label_alt: "\ue62a"
        class_name: "system-widget"
        callbacks:
          on_left: "exec start_menu"
